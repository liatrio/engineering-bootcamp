apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: keda-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:8.6-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
          args:
            - --maxmemory
            - 5mb
            - --maxmemory-policy
            - noeviction
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: keda-demo
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
